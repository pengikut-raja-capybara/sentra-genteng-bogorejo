# Deploy to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          VITE_CONTENT_GITHUB_OWNER: ${{ vars.VITE_CONTENT_GITHUB_OWNER || 'pengikut-raja-capybara' }}
          VITE_CONTENT_GITHUB_REPO: ${{ vars.VITE_CONTENT_GITHUB_REPO || 'sentra-genteng-bogorejo' }}
          VITE_CONTENT_GITHUB_BRANCH: ${{ vars.VITE_CONTENT_GITHUB_BRANCH || 'content' }}
          VITE_CONTENT_BASE_PATH: ${{ vars.VITE_CONTENT_BASE_PATH || 'content' }}
        run: bun run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages